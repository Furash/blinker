name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: resolve
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "tag=$tag" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean BlinkerUI.spec

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $tag = "${{ steps.resolve.outputs.tag }}".TrimStart("v")
          $py = Get-Content blinker_ui.py -Raw
          if ($py -notmatch '__version__\s*=\s*"' + [regex]::Escape($tag) + '"') {
            Write-Error "Tag $tag does not match __version__ in blinker_ui.py"
            exit 1
          }

      - name: Package zip + SHA256
        shell: pwsh
        run: |
          $tag = "${{ steps.resolve.outputs.tag }}"
          $zip = "BlinkerUI-$tag.zip"
          Compress-Archive -Path dist/BlinkerUI -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -Encoding ascii -NoNewline "$zip.sha256"
          "ZIP_PATH=$zip"        | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "SHA_PATH=$zip.sha256" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
          generate_release_notes: true
