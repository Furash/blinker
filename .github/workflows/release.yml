name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: resolve
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-+].+)?$') {
            Write-Error "Tag '$tag' must match v<MAJOR>.<MINOR>.<PATCH> (e.g. v0.1.1)"
            exit 1
          }
          $version = $tag.Substring(1)
          "tag=$tag"         | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          "version=$version" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $version = "${{ steps.resolve.outputs.version }}"
          $path = "blinker_ui.py"
          $py = Get-Content $path -Raw
          $new = [regex]::Replace($py, '(?m)^__version__\s*=\s*"[^"]*"', "__version__ = `"$version`"")
          if ($new -eq $py) {
            Write-Error "Failed to stamp __version__ in $path (pattern not found)"
            exit 1
          }
          Set-Content -Path $path -Value $new -NoNewline -Encoding utf8

      - name: Build with PyInstaller (downloads UPX, force-compresses CFG DLLs)
        shell: cmd
        run: build_exe.cmd

      - name: Package zip + SHA256
        shell: pwsh
        run: |
          $tag = "${{ steps.resolve.outputs.tag }}"
          $zip = "BlinkerUI-$tag.zip"
          Compress-Archive -Path dist/BlinkerUI -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -Encoding ascii -NoNewline "$zip.sha256"
          "ZIP_PATH=$zip"        | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "SHA_PATH=$zip.sha256" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
          generate_release_notes: true
